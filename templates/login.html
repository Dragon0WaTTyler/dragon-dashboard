<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Login</title>
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(0, 0, 0, 0.72);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent: #ff0000;
            --accent-soft: rgba(255, 0, 0, 0.14);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Manrope", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 0, 0, 0.12), transparent 26%),
                radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.04), transparent 18%),
                var(--bg);
        }
        .login-shell {
            width: min(100%, 420px);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), var(--panel);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.48);
        }
        .kicker {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }
        h1 {
            margin: 0;
            font-size: 2.3rem;
            line-height: 1;
            font-family: "Cormorant Garamond", Georgia, serif;
            font-weight: 500;
        }
        p {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }
        form {
            margin-top: 24px;
            display: grid;
            gap: 14px;
        }
        label {
            display: grid;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.82);
            color: var(--text);
        }
        input:focus {
            outline: none;
            border-color: rgba(255, 0, 0, 0.45);
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.12);
        }
        .error {
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 0, 0, 0.24);
            background: var(--accent-soft);
            color: #ffd6d6;
            font-size: 0.9rem;
        }
        button {
            margin-top: 4px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 0, 0, 0.36);
            border-radius: 999px;
            background: #000000;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #ff0000;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <div class="kicker">Private Dashboard</div>
        <h1>Dragon</h1>
        <p>Sign in to access your personal dashboard and admin tools.</p>
        {% if error_message %}
        <div class="error">{{ error_message }}</div>
        {% endif %}
        <form method="post">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label>
                Username
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                Password
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Unlock Dragon</button>
        </form>
    </main>
</body>
</html>
