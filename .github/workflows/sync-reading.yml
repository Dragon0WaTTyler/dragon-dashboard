name: Sync Reading Feeds

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-reading:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync reading feeds
        run: python scripts/sync_reading_feeds.py

      # Every 2 hours is a safer V1 balance than every 30 minutes:
      # it is friendlier to RSS sources, lighter on GitHub Actions usage,
      # and avoids noisy commits when nothing meaningful changed.
      - name: Commit updated reading data
        run: |
          if [ -z "$(git status --porcelain -- reading_data.json)" ]; then
            echo "No reading_data.json changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reading_data.json
          git commit -m "Sync reading feeds"
          git push
